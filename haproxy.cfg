global
	log /dev/log	local0
	log /dev/log	local1 notice
	chroot /var/lib/haproxy
	stats socket /run/haproxy/admin.sock mode 660 level admin
	stats timeout 30s
	user haproxy
	group haproxy
	daemon

	# Default SSL material locations
	ca-base /etc/ssl/certs
	crt-base /etc/ssl/private

	# See: https://ssl-config.mozilla.org/#server=haproxy&server-version=2.0.3&config=intermediate
        ssl-default-bind-ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384
        ssl-default-bind-ciphersuites TLS_AES_128_GCM_SHA256:TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256
        ssl-default-bind-options ssl-min-ver TLSv1.2 no-tls-tickets

defaults
	log	global
	mode	http
	option	httplog
	option	dontlognull
        timeout connect 5000
        timeout client  50000
        timeout server  50000
	errorfile 400 /etc/haproxy/errors/400.http
	errorfile 403 /etc/haproxy/errors/403.http
	errorfile 408 /etc/haproxy/errors/408.http
	errorfile 500 /etc/haproxy/errors/500.http
	errorfile 502 /etc/haproxy/errors/502.http
	errorfile 503 /etc/haproxy/errors/503.http
	errorfile 504 /etc/haproxy/errors/504.http


# ==========================================
# 1. HTTP 入口 (80 端口) -> 全盘交给 Caddy
# ==========================================
# 只要是 ACME 证书申请流量，无条件放行
####
###http-request accept if { path_beg /.well-known/acme-challenge/ }
###
frontend http_front
        bind *:80
        mode http
        # Caddy 会自动处理 80 到 443 的 HTTPS 重定向
        default_backend caddy_http

backend caddy_http
        mode http
        # 假设你的 Caddy HTTP 监听在本地的 8080 端口
        server caddy_server 127.0.0.1:8080 check

# ==========================================
# 2. L4 核心网关 (443 端口 SNI 嗅探)
# ==========================================
frontend https_front
        bind *:443
        # 强制覆盖 defaults 中的 http 模式，采用纯 tcp 模式
        mode tcp
        option tcplog
        
        # 嗅探 TLS 握手里的 SNI 信息 (最多等待 5 秒)
        tcp-request inspect-delay 5s
        tcp-request content accept if { req_ssl_hello_type 1 }

        # ==========================================
        # 🎯 第一步：定义 ACL 规则 (给流量贴标签)
        # ==========================================
        # 将 YOUR-domain.com 替换为你真实的 DERP 域名（如 la.domain.de）
        acl is_derp req_ssl_sni -i YOUR-domain.com
        
        # 👇 未来扩展新网站时，只需在这里抄作业加一行 ACL：
        # acl is_blog req_ssl_sni -i blog.domain.com
        # acl is_nextcloud req_ssl_sni -i cloud.domain.com


        # ==========================================
        # 🔀 第二步：根据 ACL 标签进行后端分发
        # ==========================================
        # 匹配到 is_derp 标签的流量，扔给 8443 端口的 derper
        use_backend derp_backend if is_derp
        
        # 👇 未来扩展新网站时，解开这些注释，让它们走 Caddy：
        # use_backend caddy_https if is_blog
        # use_backend caddy_https if is_nextcloud


        # ==========================================
        # 🛡️ 第三步：兜底策略
        # ==========================================
        # 其他所有没有匹配上 ACL 规则的未知流量，默认全部扔给 Caddy 后端。
        # (Caddy 收到未知域名的流量时，会自动返回空白或 444，有效防止恶意扫描)
        default_backend caddy_https

# ==========================================
# 3. 后端：Tailscale DERP
# ==========================================
backend derp_backend
        mode tcp
        # 关键修正：针对长连接将超时时间拉长到 2 小时，防止隧道频繁断开
        timeout server 2h
        timeout tunnel 2h 
        # 假设你的 derper 进程 HTTPS 监听在本地的 8443 端口
        server derper_server 127.0.0.1:8443 check check-ssl verify none sni req.ssl_sni check-sni YOUR-domain.com
# ==========================================
# 4. 后端：Caddy (Web 服务扩展)
# ==========================================
backend caddy_https
        mode tcp
        # 假设你的 Caddy HTTPS 监听在本地的 8444 端口 (Caddy 会自行处理 TLS 解密)
        server caddy_server 127.0.0.1:8444 check send-proxy-v2 check
